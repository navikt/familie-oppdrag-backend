apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: familie-oppdrag-backend
  namespace: teamfamilie
  labels:
    team: teamfamilie

spec:
  image: {{ image }}
  port: 8087
  envFrom:
    - secret: familie-oppdrag-backend
  liveness:
    path: /internal/health/liveness
    initialDelay: 30
    failureThreshold: 10
  readiness:
    path: /internal/health/readyness
    initialDelay: 30
    failureThreshold: 10
  prometheus:
    enabled: true
    path: /internal/prometheus
  replicas:
    min: 2
    max: 4
  resources:
    limits:
      memory: 700Mi
    requests:
      memory: 700Mi
      cpu: 25m
  ingresses:
    - https://familie-oppdrag-backend.dev.intern.nav.no
  sqlInstances:
    - type: POSTGRES_17 # IF This is changed, all data will be lost. Read on nais.io how to upgrade
      tier: db-custom-1-3840
      name: familie-oppdrag-17
      autoBackupHour: 2
      diskAutoresize: true
      databases:
        - name: familie-oppdrag
          envVarPrefix: DB
  azure:
    application:
      enabled: true
      allowAllUsers: true
  accessPolicy:
    inbound:
      rules:
        - application: familie-ks-sak
        - application: familie-ba-sak-lokal
          cluster: dev-gcp
        - application: familie-ba-sak
          cluster: dev-gcp
        - application: familie-ks-sak
          cluster: dev-gcp
        - application: familie-tilbake
          cluster: dev-gcp
        - application: tilbakekreving-backend
          namespace: tilbake
          cluster: dev-gcp
        - application: familie-tilbake-lokal
          cluster: dev-gcp
        - application: familie-ef-sak
          cluster: dev-gcp
        - application: familie-ef-sak-lokal
          cluster: dev-gcp
        - application: familie-ef-iverksett
          cluster: dev-gcp
        - application: familie-ef-iverksett-lokal
          cluster: dev-gcp
        - application: azure-token-generator
          namespace: nais
          cluster: dev-gcp
    outbound:
      rules:
        - application: logging
          namespace: nais-system
      external:
        - host: b27apvl220.preprod.local
          ports:
            - port: 1413

  observability:
    logging:
      destinations:
        - id: elastic
        - id: loki
    autoInstrumentation:
      enabled: true
      runtime: java
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: preprod
    - name: JDK_JAVA_OPTIONS
      value: "-XX:MinRAMPercentage=25.0 -XX:MaxRAMPercentage=75.0 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp"
