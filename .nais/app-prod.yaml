apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: familie-oppdrag-backend
  namespace: teamfamilie
  labels:
    team: teamfamilie
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"

spec:
  image: {{ image }}
  port: 8087
  envFrom:
    - secret: familie-oppdrag-backend
  liveness:
    path: /internal/health/liveness
    initialDelay: 30
    failureThreshold: 10
  readiness:
    path: /internal/health/readyness
    initialDelay: 30
    failureThreshold: 10
  prometheus:
    enabled: true
    path: /internal/prometheus
  replicas:
    min: 2
    max: 4
  resources:
    limits:
      memory: 6096Mi
    requests:
      memory: 2000Mi
      cpu: 500m
  ingresses: # Optional. List of ingress URLs that will route HTTP traffic to the application.
    - https://familie-oppdrag-backend.intern.nav.no
  azure:
    application:
      enabled: true
      allowAllUsers: false # FIXME
  accessPolicy:
    inbound:
      rules:
        - application: familie-ks-sak
        - application: familie-ks-sak
          cluster: prod-gcp
        - application: familie-ba-sak
          cluster: prod-gcp
        - application: familie-tilbake
          cluster: prod-gcp
        - application: tilbakekreving-backend
          namespace: tilbake
          cluster: prod-gcp
        - application: familie-ef-sak
          cluster: prod-gcp
        - application: familie-ef-iverksett
          cluster: prod-gcp
    outbound:
      rules:
        - application: logging
          namespace: nais-system
      external:
        - host: mpls02.adeo.no
          ports:
            - port: 1414
  observability:
    logging:
      destinations:
        - id: elastic
        - id: loki
    autoInstrumentation:
      enabled: true
      runtime: java
      destinations:
        - id: "grafana-lgtm"
        - id: "elastic-apm"
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: prod
    - name: JDK_JAVA_OPTIONS
      value: "-XX:MinRAMPercentage=25.0 -XX:MaxRAMPercentage=75.0 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp"
